# InFMon backend (VPP plugin) — default configuration.
#
# This file is read by infmon.so when VPP loads the plugin. See spec 004
# for the full list of options. This default is intended to be safe to
# install on a stock VPP system — it enables nothing automatically.

[plugin]
# Master enable/disable. The operator must flip this to true after
# configuring at least one input feature attachment.
enabled = false

[stats]
# How often to publish counters into the VPP stats segment.
# The frontend polls the segment, so this also bounds export latency.
publish_interval_ms = 1000

[log]
# VPP plugin log level: error | warn | info | debug
level = "info"
