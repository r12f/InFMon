# InFMon frontend (daemon) — default configuration.
#
# Read by infmon-frontend at startup. See spec 005 for the full schema.
# This default is intended to start cleanly on a stock VPP install: it
# binds to the loopback REST endpoint and uses the canonical VPP socket
# locations.

[vpp]
# Path to the VPP binary-API Unix socket. Standard on Debian/Ubuntu.
api_socket = "/run/vpp/api.sock"
# Path to the VPP stats segment.
stats_socket = "/run/vpp/stats.sock"
# Retry budget for attaching to VPP at startup. Per spec 008 §7.1, the
# frontend reports status=waiting_for_vpp until the plugin appears.
attach_retry_seconds = 0   # 0 = retry forever

[rest]
# Frontend REST listener (spec 005). Operators front this with their
# own reverse proxy if they need TLS / auth.
bind = "127.0.0.1:9880"

[flow_defs]
# Directory of operator-supplied flow_def YAML files (spec 002).
# Anything matching *.yaml here is loaded at startup.
dir = "/etc/infmon/flow_defs.d"

[log]
# Daemon log level: error | warn | info | debug | trace
level = "info"
# Log file is also collected by journald via systemd's StandardOutput=
# default; the file path here is the on-disk copy that logrotate manages.
file = "/var/log/infmon/infmon-frontend.log"
