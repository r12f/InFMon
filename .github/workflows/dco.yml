name: dco

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: dco
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit in the PR
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          # Iterate over each commit in the PR range.
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
              # Skip GitHub-authored squash-merge commits (e.g. from web UI).
              author_email=$(git log -1 --format='%ae' "$sha")
              if echo "$author_email" | grep -qE '^[0-9]+\+[^@]+@users\.noreply\.github\.com$|^noreply@github\.com$'; then
                  echo "  skipping $sha (GitHub-authored: $author_email)"
                  continue
              fi
              if ! git log -1 --format=%B "$sha" \
                      | grep -qE '^Signed-off-by: .+ <.+@.+>[[:space:]]*$'; then
                  echo "::error::commit $sha is missing a 'Signed-off-by:' trailer."
                  git log -1 --format='  %h %s%n  author: %an <%ae>' "$sha"
                  missing=$((missing + 1))
              fi
          done
          if [ "$missing" -gt 0 ]; then
              echo ""
              echo "Add sign-off to existing commits with:"
              echo "    git rebase --signoff ${BASE_SHA}..HEAD"
              echo "    git push --force-with-lease"
              exit 1
          fi
          echo "All commits have a valid Signed-off-by trailer."

      - name: Verify Signed-off-by on push commits
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          # On push to main, check the pushed commits (before..after).
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push — skipping DCO check."
            exit 0
          fi
          # Guard against force-pushes where BEFORE is not an ancestor of AFTER.
          if ! git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
            echo "::warning::BEFORE ($BEFORE) is not an ancestor of AFTER ($AFTER) — skipping DCO check for this push."
            exit 0
          fi
          missing=0
          for sha in $(git rev-list --no-merges "${BEFORE}..${AFTER}"); do
              # Skip GitHub-authored squash-merge commits.
              author_email=$(git log -1 --format='%ae' "$sha")
              if echo "$author_email" | grep -qE '^[0-9]+\+[^@]+@users\.noreply\.github\.com$|^noreply@github\.com$'; then
                  echo "  skipping $sha (GitHub-authored: $author_email)"
                  continue
              fi
              if ! git log -1 --format=%B "$sha" \
                      | grep -qE '^Signed-off-by: .+ <.+@.+>[[:space:]]*$'; then
                  echo "::error::commit $sha is missing a 'Signed-off-by:' trailer."
                  git log -1 --format='  %h %s%n  author: %an <%ae>' "$sha"
                  missing=$((missing + 1))
              fi
          done
          if [ "$missing" -gt 0 ]; then
              exit 1
          fi
          echo "All commits have a valid Signed-off-by trailer."
