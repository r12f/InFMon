name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-build:
    name: build-rust
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-arm64

      - name: Detect Cargo workspace
        id: detect_rust
        run: |
          if [ -f Cargo.toml ]; then
            echo "have_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_workspace=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Cargo.toml at repo root yet; Rust build is a no-op."
          fi

      - name: cargo build (release)
        if: steps.detect_rust.outputs.have_workspace == 'true'
        run: cargo build --workspace --all-targets --release --locked

  cpp-build:
    name: build-cpp
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add fd.io apt repo
        run: |
          set -eux
          curl -fsSL https://packagecloud.io/fdio/release/gpgkey \
            | sudo gpg --dearmor -o /usr/share/keyrings/fdio-archive-keyring.gpg
          expected="59A8E0DB0B611CA471C9FBDE9E9FE7A46C37F7CD"
          actual=$(gpg --no-default-keyring \
            --keyring /usr/share/keyrings/fdio-archive-keyring.gpg \
            --list-keys --with-colons 2>/dev/null \
            | awk -F: '/^fpr/{print $10; exit}')
          [[ "$actual" == "$expected" ]] || { echo "GPG key mismatch: got $actual"; exit 1; }
          echo "deb [signed-by=/usr/share/keyrings/fdio-archive-keyring.gpg] \
            https://packagecloud.io/fdio/release/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") main" \
            | sudo tee /etc/apt/sources.list.d/fdio.list

      - name: Install build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              cmake ninja-build g++ ccache pkg-config \
              vpp-dev=24.10* libvppinfra-dev=24.10*

      - name: Detect backend source
        id: detect_cpp
        run: |
          if [ -f src/backend/CMakeLists.txt ]; then
            echo "have_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_backend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/backend/CMakeLists.txt not present yet; C++ build is a no-op."
          fi

      - name: Install test deps
        if: steps.detect_cpp.outputs.have_backend == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              cmake ninja-build g++ libgtest-dev ccache pkg-config

      - name: Configure + build
        if: steps.detect_cpp.outputs.have_backend == 'true'
        run: |
          cmake -S src/backend -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build
