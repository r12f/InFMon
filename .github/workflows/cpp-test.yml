name: cpp-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-test:
    name: cpp-test
    runs-on: ubuntu-24.04
    # VPP-in-CI image; see specs/001-ci-and-precommit.md §5.
    # Consumed from the ghcr.io mirror to avoid Docker Hub rate-limits.
    container:
      image: ligato/vpp-base:24.10
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build tools present in image
        run: |
          set -eux
          for cmd in cmake ninja g++ clang ccache pkg-config; do
            command -v "$cmd" || { echo "::error::$cmd not found in container image"; exit 1; }
          done
          dpkg -s libgtest-dev >/dev/null 2>&1 || { echo "::error::libgtest-dev not installed in container image"; exit 1; }

      - name: Verify VPP dev headers
        run: |
          if [ ! -d /usr/include/vpp ]; then
            echo "::error::VPP dev headers missing under /usr/include/vpp."
            exit 1
          fi

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('src/backend/**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Detect backend source
        id: detect
        run: |
          if [ -f src/backend/CMakeLists.txt ]; then
            echo "have_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_backend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/backend/CMakeLists.txt not present yet; cpp-test is a no-op until the backend lands."
          fi

      - name: Configure
        if: steps.detect.outputs.have_backend == 'true'
        run: |
          cmake -S src/backend -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        if: steps.detect.outputs.have_backend == 'true'
        run: cmake --build build

      - name: cppcheck (full tree)
        if: steps.detect.outputs.have_backend == 'true'
        # Let cppcheck auto-detect C vs C++ per file extension; pinning
        # --std=c11 misparses any .cpp/.cc sources (gtest harnesses).
        run: |
          cppcheck \
              --enable=warning,performance,portability \
              --error-exitcode=1 \
              --inline-suppr \
              --suppressions-list=.cppcheck-suppressions \
              src/backend

      - name: ctest
        if: steps.detect.outputs.have_backend == 'true'
        run: ctest --test-dir build --output-on-failure
