name: cpp-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-test:
    name: cpp-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add fd.io apt repo
        run: |
          set -eux
          curl -fsSL https://packagecloud.io/fdio/release/gpgkey \
            | sudo gpg --dearmor -o /usr/share/keyrings/fdio-archive-keyring.gpg
          expected="59A8E0DB0B611CA471C9FBDE9E9FE7A46C37F7CD"
          actual=$(gpg --no-default-keyring \
            --keyring /usr/share/keyrings/fdio-archive-keyring.gpg \
            --list-keys --with-colons 2>/dev/null \
            | awk -F: '/^fpr/{print $10; exit}')
          [[ "$actual" == "$expected" ]] || { echo "GPG key mismatch: got $actual"; exit 1; }
          echo "deb [signed-by=/usr/share/keyrings/fdio-archive-keyring.gpg] \
            https://packagecloud.io/fdio/release/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") main" \
            | sudo tee /etc/apt/sources.list.d/fdio.list

      - name: Install build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              cmake ninja-build g++ clang libgtest-dev ccache pkg-config \
              cppcheck vpp-dev=24.10* libvppinfra-dev=24.10*

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('src/backend/**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Detect backend source
        id: detect
        run: |
          if [ -f src/backend/CMakeLists.txt ]; then
            echo "have_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_backend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/backend/CMakeLists.txt not present yet; cpp-test is a no-op until the backend lands."
          fi

      - name: Configure
        if: steps.detect.outputs.have_backend == 'true'
        run: |
          cmake -S src/backend -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        if: steps.detect.outputs.have_backend == 'true'
        run: cmake --build build

      - name: cppcheck (full tree)
        if: steps.detect.outputs.have_backend == 'true'
        run: |
          cppcheck \
              --enable=warning,performance,portability \
              --error-exitcode=1 \
              --inline-suppr \
              --suppressions-list=.cppcheck-suppressions \
              src/backend

      - name: ctest
        if: steps.detect.outputs.have_backend == 'true'
        run: ctest --test-dir build --output-on-failure

      - name: Fuzz (bounded, 30s)
        if: steps.detect.outputs.have_backend == 'true'
        run: |
          cmake -S src/backend -B build-fuzz -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER=clang \
              -DCMAKE_CXX_COMPILER=clang++ \
              -DENABLE_FUZZER=ON
          cmake --build build-fuzz --target fuzz_erspan_parser
          mkdir -p fuzz-corpus
          # Seed corpus from golden PCAPs
          cp tests/pcaps/erspan/*.pcap fuzz-corpus/ 2>/dev/null || true
          build-fuzz/fuzz_erspan_parser fuzz-corpus/ -max_total_time=30 -max_len=2048
